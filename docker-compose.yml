version: "3.9"

# ============================================================
# TERA EXAM — Docker Compose
# Usage:
#   Development:   docker compose up
#   Production:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

services:
  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    container_name: tera-exam-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:80}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - tera-network

  frontend:
    build:
      context: .
      dockerfile: artifacts/tera-exam/Dockerfile
    container_name: tera-exam-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tera-network

networks:
  tera-network:
    driver: bridge
